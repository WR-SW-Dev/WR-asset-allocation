# Asset-class -> index bridge for the Asset Allocation Study Model.
#
# Maps each model asset class / sub-asset-class to one or more index_keys defined
# in configs/morningstar_index_universe.yaml. Consumed (optionally) by CMA
# calibration, Monte Carlo assumption sourcing, and study exhibits to select which
# normalized return series represents an asset class.
#
# CONTRACT
#   * `primary_index_key`    the default series for the asset class. Must be a broad
#                            market index, NOT a sector proxy or ETF, unless the row
#                            is itself a proxy/custom role.
#   * `secondary_index_keys` alternates for cross-checking / robustness.
#   * `fallback_index_key`   used when the primary lacks `min_history_months` of data.
#   * `model_usage`          benchmark | capital_market_assumption | stress_proxy |
#                            reporting_only.
#   * `min_history_months`   minimum monthly observations required before the series
#                            may drive CMA calibration (advisory; enforced by callers).
#
# All index_keys MUST exist in morningstar_index_universe.yaml (validated at load).
# Sector proxies (biotech, banks, Mag7) and custom proxies (Galene) are intentionally
# NOT primary benchmarks; they appear only as reporting_only / stress rows or require
# explicit approval (see `requires_approval`).

asset_classes:
  - asset_class: "US Equity - Total Market"
    sub_asset_class: "US Total Market"
    primary_index_key: russell_3000_tr_usd
    secondary_index_keys: [sp_500_tr_usd, russell_1000_tr_usd]
    fallback_index_key: sp_500_tr_usd
    model_usage: "capital_market_assumption"
    min_history_months: 120
    notes: "Broad US equity. S&P 500 is the large-cap fallback."

  - asset_class: "US Equity - Large Cap"
    sub_asset_class: "US Large Cap"
    primary_index_key: russell_1000_tr_usd
