version: "0.1.0"
seed: 42
currency: USD

# JPM CMA study profile (2026-07-17). Parallel to base.yaml — leaves the
# 4-bucket public model and its test suite untouched. Uses the 6-bucket
# entity-class taxonomy (equity, fixed_income, real_estate, pe_buyout,
# absolute_return, cash) with the riskfolio max-Sharpe optimizer so JPM's
# expected returns + volatilities + correlations all drive the weights.
#
# REQUIRES configs/cma_jpm.yaml, which is gitignored (JPM material is
# institutional-only). Generate it first:
#     python scripts/build_cma_from_jpm.py --write

governance:
  size_usd: 100000000
  tax:
    jurisdiction: US
  license: MIT

solver:
  preferred: clarabel
  fallback_chain: [clarabel, scs, osqp]

liquidity:
  floor_months: 18

pe:
  sleeve_target_pct: 0.15
  scope: [buyout]

rebalance:
  frequency: quarterly

allocation:
  engine: riskfolio
  config: configs/public_allocation_jpm.yaml

implementation:
  bps_per_trade: 0.0

cma:
  config: configs/cma_jpm.yaml

spending:
  config: configs/spending.yaml

pe_pacing:
  config: configs/pe_pacing.yaml

scenarios:
  config: configs/scenarios.yaml

fixtures:
  scenario: data/fixtures/scenarios/base_jpm.yaml

horizon:
  start_quarter: "2026Q1"
  num_quarters: 20

output:
  base_dir: data/processed/runs
