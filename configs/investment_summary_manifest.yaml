#
# Liquidity bucket vocabulary (Phase 15):
#   cash_equivalent | daily_liquid | semi_liquid | illiquid |
#   locked_strategic | re_stabilized | re_development | re_land |
#   opco_strategic
#
# Phase 15 → Phase 12 default tier mapping:
#   cash_equivalent   → liquid
#   daily_liquid      → liquid
#   semi_liquid       → semi_liquid
#   illiquid          → illiquid
#   locked_strategic  → locked_strategic
#   re_stabilized     → illiquid          (configurable via liquidity_tier_overrides)
#   re_development    → locked_strategic
#   re_land           → locked_strategic
#   opco_strategic    → locked_strategic
#
# income_cash_flow_flag: HUMAN-AUTHORED ONLY. Do not infer from column
# names or position labels. Set true only when this position produces
# distributable income that flows to the SFO family-office layer.

