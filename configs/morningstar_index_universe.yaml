# Morningstar Direct index universe for the Asset Allocation Study Model.
#
# Defines the index basket ingested by scripts/import_morningstar_index_returns.py
# (module: aa_model.ingestion.morningstar_returns). Each entry maps a Morningstar
# Direct "Common Indices" export row (matched on `display_name`, byte-exact) to a
# stable internal `index_key`, plus the metadata needed to bridge the series to the
# model's asset classes, CMA calibration, and study exhibits.
#
# CONTRACT
#   * `index_key`         stable internal slug (snake_case); the join key everywhere.
#   * `display_name`      MUST equal the Morningstar Direct row name byte-for-byte.
#   * `morningstar_id`    nullable until confirmed from an approved Morningstar source.
#   * `morningstar_symbol`nullable until confirmed. DO NOT GUESS vendor identifiers.
#   * `return_type`       total_return | net_return | price_return | unknown.
#   * `frequency`         monthly | quarterly_or_monthly_source.
#   * `model_role`        benchmark | capital_market_assumption | stress_proxy |
#                         reporting_only | sector_proxy | credit_proxy | cash_proxy |
#                         muni_credit_proxy | private_real_estate_proxy | custom_proxy.
#
# The initial basket is the 36-row `Common Indices` tab of
# "Index Returns - June 30 2026.xlsx". Vendor IDs are intentionally left null.

provider_default: "Morningstar Direct"
source_workbook: "Index Returns - June 30 2026.xlsx"
source_sheet: "Common Indices"

