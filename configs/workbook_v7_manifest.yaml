# Cashflow Modeling v7.xlsx — committed manifest SCAFFOLD.
#
# This file is a STRUCTURAL TEMPLATE, not a runnable manifest.
# Sheet names that may carry person-identifying abbreviations are
# replaced with placeholders (`<TODO_*>`). Privacy discipline:
# PROJECT_SCOPE.md §5.3 + Phase 14 RT4 — live values, person-level
# data, and abbreviations that decode to family-internal identifiers
# stay outside the repo.
#
# ----------------------------------------------------------------------------
# WORKFLOW — turn this scaffold into a runnable manifest:
# ----------------------------------------------------------------------------
#  1. Copy this file:
#         cp configs/workbook_v7_manifest.yaml \
#            configs/workbook_v7_manifest_local.yaml
#     The `_local.yaml` variant is gitignored (see .gitignore).
#  2. Open `configs/workbook_v7_manifest_local.yaml` and replace each
#     `<TODO_*>` sheet_name placeholder with the actual workbook
#     sheet name. Update `display_name` to a human label of your
#     choosing. The committed `entity_id` values are stable codes
#     (URL-safe, no colons) and SHOULD NOT be changed unless you
#     have a reason — they anchor deterministic producer_ids in the
#     Phase 14 → Phase 13 bridge.
#  3. Author `row_classification_rules` per entity sheet locally.
#     The committed scaffold leaves these empty with TODO markers;
#     row labels carry sensitive per-line content and must not be
#     committed.
#  4. Point your StudyConfig at the local manifest:
#         workbook_ingestion:
#           workbook_path: ".../Cashflow Modeling v7.xlsx"
#           manifest_version: "1"
#           manifest: <load configs/workbook_v7_manifest_local.yaml>
#  5. Run ingestion + reconciliation locally. Do NOT commit the
#     local manifest. Do NOT paste live values, row labels, or
#     person-level identifiers into chat or docs.
# ----------------------------------------------------------------------------
#
# Header layout (probed via /tmp/phase14_layout_probe.py — not committed):
#   - data-rich entity sheets place quarterly headers on row 4
#     in `q_yyyy` format ("Q1 2025", "Q2 2025", ...).
#   - aggregate / board / metadata sheets are declared but
#     `display_only` so the parser never extracts data rows from them.
#
# Sheet count: 43 total (audit number from the discovery probe).
#   structural / literal names: 17
#   redacted / placeholder slots: 26

workbook_version: "v7"
expected_workbook_filename: "Cashflow Modeling v7.xlsx"
default_header_row_index: 4
period_header_format: "q_yyyy"

# Subtotal / total row exclusion patterns. Defaults from Phase 14
# carried forward; extend locally if v7 introduces new total-row
# wording.
subtotal_label_patterns:
  - "total"
  - "subtotal"
  - "sum"
  - "grand total"
  - "net cash"

# Family aggregate sheets — reconciliation targets only. The parser
# reads these via `_reconcile_aggregate_sheet`; no
# `CashFlowLineRecord` rows are emitted from them.
family_aggregate_sheets:
  - "Summary"
  - "Summary Dev and Op"

# Board snapshot sheets — period-by-period forecast snapshots.
# Phase 14 reviewer tightening 3: reconciliation deltas surfaced as
# advisory only.
board_snapshot_sheets:
  - "September 25 Board"
  - "November 25 Board"
  - "March 26 Board"
  - "March 26 Board (2)"
  - "June 26 Board"

# Real-estate partnership sheets. The committed scaffold uses literal
# names where the sheet name is clearly project-shaped
# (project / place identifier rather than person identifier).
re_partnership_sheets: []

# Entity sheets. Each entry below is one of:
#   (a) `display_only` placeholder for an aggregate / metadata /
#       structurally-redundant sheet that we declare but do not parse.
#   (b) `horizontal_quarter` (default) for a normal entity-level
#       cash-flow sheet whose row labels are mapped to classification
#       rules locally.
#
# `<TODO_*>` placeholders are NEVER valid sheet names in the live
# workbook — the user must replace them in the local manifest.
