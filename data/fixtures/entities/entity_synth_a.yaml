# Phase 24 — synthetic entity fixture (committed; NO client data).
# Exercises all four deterministic dimensions: perimeter, account scope,
# balance-sheet segmentation (investable vs structural), PE commitment
# exposure. Amounts are strings so they coerce to Decimal exactly.
# Investable base = 40,000,000 ; structural NAV = 60,000,000 ; total = 100,000,000.
fixture_version: synth_a_v1
entity_id: entity_synth_a
as_of_date: 2026-04-30
expected_total_nav_usd: "100000000.00"

accounts:
  - account_id: acct_synth_brokerage
    entity_id: entity_synth_a
    custodian: SynthCustodian
    account_type: taxable
    valuation_date: 2026-04-30
  - account_id: acct_synth_trust
    entity_id: entity_synth_a
    custodian: SynthCustodian
    account_type: trust
    valuation_date: 2026-04-30

segments:
  # --- investable financial assets (carry a policy_class) ---
  - {segment_key: inv_re_opco, segment: investable, policy_class: re_opco_stabilized, amount_usd: "2000000.00"}
  - {segment_key: inv_real_estate, segment: investable, policy_class: real_estate, amount_usd: "4000000.00"}
  - {segment_key: inv_equity, segment: investable, policy_class: equity, amount_usd: "4000000.00"}
