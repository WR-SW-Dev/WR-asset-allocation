  - {segment_key: inv_cash, segment: investable, policy_class: cash_and_cash_alts, amount_usd: "11000000.00"}
  # --- personal-use & structural (NO policy_class; never investable) ---
  - {segment_key: str_personal_use, segment: personal_use, amount_usd: "50000000.00"}
  - {segment_key: str_note_recv, segment: note_receivable, amount_usd: "5000000.00"}
  - {segment_key: str_nested_opco, segment: nested_opco_equity, amount_usd: "4000000.00"}
  - {segment_key: str_life_ins, segment: life_insurance_csv, amount_usd: "1000000.00"}

